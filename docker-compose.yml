services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: grounded_document_assistant_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: grounded_document_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d grounded_document_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: grounded_document_assistant_redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
